<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your NotionKit Templates — Access Your Purchase</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    :root { --accent:#4f46e5; --light:#f9fafb; --border:#e5e7eb; --gray:#6b7280; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--light); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:white; border-radius:20px; padding:48px 40px; max-width:600px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,.08); text-align:center; }
    .loading { color:var(--gray); }
    .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .success-icon { font-size:56px; margin-bottom:16px; }
    h1 { font-size:28px; font-weight:800; margin-bottom:8px; color:#111; }
    .subtitle { color:var(--gray); font-size:15px; margin-bottom:36px; line-height:1.5; }
    .template-list { text-align:left; }
    .template-item { border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .template-info { flex:1; }
    .template-emoji { font-size:24px; margin-right:12px; }
    .template-name { font-weight:600; font-size:15px; color:#111; }
    .template-desc { font-size:13px; color:var(--gray); margin-top:2px; }
    .btn-open { background:var(--accent); color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; white-space:nowrap; transition:opacity .2s; display:inline-block; }
    .btn-open:hover { opacity:.85; }
    .btn-open.disabled { background:#d1d5db; cursor:not-allowed; }
    .instructions { background:#eef2ff; border-radius:10px; padding:16px; margin-top:24px; text-align:left; }
    .instructions h3 { font-size:14px; font-weight:700; color:var(--accent); margin-bottom:8px; }
    .instructions ol { font-size:13px; color:#374151; padding-left:18px; line-height:1.8; }
    .support { margin-top:24px; font-size:13px; color:var(--gray); }
    .support a { color:var(--accent); text-decoration:none; }
    .error { color:#ef4444; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div id="loading">
      <div class="spinner"></div>
      <p class="loading">Confirming your purchase...</p>
    </div>
    <div id="content" style="display:none"></div>
  </div>

  <script>
    
const NOTION_LINKS = {
  "prod_UDJVRB6faFAnMa": { name: "Freelance OS", emoji: "🚀", url: "https://www.notion.so/32efe7742067813db3eef3caf4a18fc8?duplicate=1" },
  "prod_UDJVPGT1zJCMXW": { name: "Finance Tracker Pro", emoji: "💰", url: "https://www.notion.so/32efe7742067815f8a9df18bce6c6ed8?duplicate=1" },
  "prod_UDJVITQV2hEwNT": { name: "Content Creator Hub", emoji: "📅", url: "https://www.notion.so/32efe7742067815eab20dd97655e7796?duplicate=1" },
  "prod_UDJVengahUGfQo": { name: "Goal & Habit Tracker", emoji: "🎯", url: "https://www.notion.so/32efe774206781b99359e905ce9045b1?duplicate=1" },
  "prod_UDJVEUV0xgwlj3": { name: "Project Manager Pro", emoji: "🏗️", url: "https://www.notion.so/32efe77420678148ae9dc2db73b2afca?duplicate=1" },
  "prod_UDJVfBSNUyhAi4": { name: "Second Brain Starter", emoji: "🧠", url: "https://www.notion.so/32efe7742067819ab1deccefc3fd4d07?duplicate=1" },
  "prod_UDJVIkt088gKxz": { name: "Complete Bundle", emoji: "🎉", url: "all_individual", is_bundle: true }
};

const BUNDLE_PRODUCTS = [
  "prod_UDJVRB6faFAnMa",
  "prod_UDJVPGT1zJCMXW",
  "prod_UDJVITQV2hEwNT",
  "prod_UDJVengahUGfQo",
  "prod_UDJVEUV0xgwlj3",
  "prod_UDJVfBSNUyhAi4"
];


    const stripe = Stripe("pk_live_51TESQbDuxCo8LELdprT2aMCziEr6IMTIaHI0AbCFTcLLlsU1cpHV86XT5AxxdazkSN9o4MP0VLdeBcKPmbWcGHFe0047BducoR");

    async function getSessionData(sessionId) {
      // Use Stripe.js to retrieve session without exposing secret key
      // We verify via the webhook — here we just display based on session_id presence
      // The webhook has already processed the payment server-side
      return sessionId;
    }

    function renderTemplates(products) {
      let html = `
        <div class="success-icon">🎉</div>
        <h1>Your templates are ready!</h1>
        <p class="subtitle">Thank you for your purchase. Click the button next to each template to access it in Notion.</p>
        <div class="template-list">
      `;

      for (const prod of products) {
        const link = prod.url !== "PLACEHOLDER_FREELANCE_OS" &&
                     !prod.url.startsWith("PLACEHOLDER") &&
                     prod.url !== "BUNDLE"
          ? prod.url : null;

        html += `
          <div class="template-item">
            <span class="template-emoji">${prod.emoji}</span>
            <div class="template-info">
              <div class="template-name">${prod.name}</div>
            </div>
            ${link
              ? `<a href="${link}" target="_blank" class="btn-open">Open in Notion →</a>`
              : `<span class="btn-open disabled" title="Link being set up">Coming soon</span>`
            }
          </div>
        `;
      }

      html += `</div>
        <div class="instructions">
          <h3>💡 How to use your templates</h3>
          <ol>
            <li>Click "Open in Notion →" next to each template</li>
            <li>Click <strong>Duplicate</strong> in the top-right corner of Notion</li>
            <li>The template is now in your workspace — customize it!</li>
          </ol>
        </div>
        <p class="support">
          Questions? Email us at <a href="mailto:kcc@linfos.net">kcc@linfos.net</a><br>
          30-day money-back guarantee · <a href="index.html">Back to store</a>
        </p>
      `;
      return html;
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");

      if (!sessionId && !params.get("success")) {
        window.location.href = "index.html";
        return;
      }

      // Try to get session details from Stripe (retrieval endpoint needs secret key - use our webhook)
      // For now, show the product based on the payment link that was clicked
      // The session_id encodes the payment link used

      // If session_id is present, show success with all purchased products
      // The webhook server has already logged the delivery
      // We'll show a generic success or try to decode from URL

      const productId = params.get("product_id");
      let productsToShow = [];

      if (productId && NOTION_LINKS[productId]) {
        const p = NOTION_LINKS[productId];
        if (p.is_bundle) {
          productsToShow = BUNDLE_PRODUCTS.map(pid => NOTION_LINKS[pid]);
        } else {
          productsToShow = [p];
        }
      } else {
        // Show a generic success page asking them to check email
        document.getElementById("loading").innerHTML = `
          <div class="success-icon">✅</div>
          <h1>Payment successful!</h1>
          <p class="subtitle">Your templates are being prepared. Check your email for your delivery link, or contact us at <a href="mailto:kcc@linfos.net" style="color:var(--accent)">kcc@linfos.net</a> with your order details.</p>
          <p class="support"><a href="index.html">← Back to store</a></p>
        `;
        return;
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
      document.getElementById("content").innerHTML = renderTemplates(productsToShow);
    }

    init();
  </script>
</body>
</html>
